<!DOCTYPE html>
<html lang="ko">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>인천 ICT 이노베이션스퀘어 | 팝업 등록</title>
      <meta name="description" content="인천 ICT 이노베이션스퀘어 관리자 시스템">
      <link rel="stylesheet" href="/resource/css/reset.css">
      <link rel="stylesheet" href="/resource/css/layout.css">
      <link rel="stylesheet" href="/resource/css/component.css">
      <link rel="stylesheet" href="/resource/css/admin.css">
      <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
      <script src="/resource/js/common.js"></script>
   </head>
   <body>
      <div class="admin-wrap">
         <div class="side-wrap" id="menu"></div>

         <div class="main">
            <header class="flex w-full">
               <div class="breadcrumb">
                  <a href="adminPopupSet.html">팝업 관리</a>
                  <span class="icon-box s16"><i class="icon icon-chevron_right"></i></span>
                  <span>팝업 등록</span>
               </div>
               <div class="btn_wrap">
                  <button type="button" class="btn btn-xs btn-text">ICT 메인페이지</button>
                  <button type="button" class="btn btn-xs btn-black">로그아웃</button>
               </div>
            </header>

            <div class="main_wrap">
               <div class="inner2">
                  <div class="main_tit">
                     <h2>팝업 등록</h2>
                  </div>
                  <div class="sect_cont">
                     <div class="form_table">
                        <table class="table_form">
                           <tbody>
                              <tr>
                                 <th>노출 여부 <span class="req_mark">*</span></th>
                                 <td>
                                    <div class="radio_wrap">
                                       <label class="radio_st1"><input type="radio" name="visible" checked> 노출</label>
                                       <label class="radio_st1"><input type="radio" name="visible"> 노출 안함</label>
                                    </div>
                                 </td>
                              </tr>
                              <tr>
                                 <th>대표 이미지 <span class="req_mark">*</span></th>
                                 <td>
                                    <div class="form_inp_row">
                                       <input type="text" class="inp_st1" id="fileName" placeholder="선택된 파일 없음" readonly="">
                                       <input type="file" class="inp_st1 hide" id="uploadFile">
                                       <label class="btn btn-sub btn-sm" for="uploadFile">파일 업로드</label>
                                    </div>
                                 </td>
                              </tr>
                              <tr>
                                 <th>노출 일정 <span class="req_mark">*</span></th>
                                 <td>
                                    <div class="date_box">
                                       <input class="input_date inp_st1" type="date">
                                       <p class="hyp">~</p>
                                       <input class="input_date inp_st1" type="date">
                                    </div>
                                 </td>
                              </tr>
                              <tr>
                                 <th>이동할 URL <span class="req_mark">*</span></th>
                                 <td><input type="text" class="inp_st1 wd100" placeholder="팝업 클릭 시 이동할 URL 주소를 입력해주세요"></td>
                              </tr>
                           </tbody>
                        </table>
                     </div>
                     <div class="btn_wrap flex_end mt20">
                        <button type="button" class="btn btn-md btn-line" onclick="history.back()">취소</button>
                        <button type="button" class="btn btn-md btn-black">등록</button>
                     </div>
                  </div>
               </div>
            </div>
         </div>
      </div>
      <script>loadAdminMenu();</script>
   </body>
</html>
