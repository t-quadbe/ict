<!DOCTYPE html>
<html lang="ko">
   <head>

   </head>
   <body>
      <div class="admin-wrap">
         <div class="side-wrap" id="menu"></div>

         <div class="main">
            <header class="flex w-full">
               <div class="btn_wrap">
                  <button type="button" class="btn btn-xs btn-text">ICT 메인페이지</button>
                  <button type="button" class="btn btn-xs btn-black">로그아웃</button>
               </div>
            </header>

            <div class="main_wrap">
               <div class="inner2">
                  <div class="main_tit flex_between">
                     <h2>자료실</h2>
                     <a href="adminArchive_board.html" class="btn btn-md btn-black">새 자료 등록 +</a>
                  </div>
                  <div class="sect_cont">
                     <div class="filter_box">
                        <div class="filter_row">
                           <div class="select_box">
                              <label>구분</label>
                              <select class="inp_st1">
                                 <option value="">전체</option>
                                 <option value="edu">교육자료</option>
                                 <option value="manual">매뉴얼</option>
                              </select>
                           </div>
                           <div class="select_box">
                              <label>카테고리</label>
                              <select class="inp_st1">
                                 <option value="">전체</option>
                                 <option value="news">소식</option>
                                 <option value="guide">안내</option>
                              </select>
                           </div>
                           <div class="select_box">
                              <label>상태</label>
                              <select class="inp_st1">
                                 <option value="">전체</option>
                                 <option value="show">노출</option>
                                 <option value="hide">비노출</option>
                              </select>
                           </div>
                        </div>
                        <div class="filter_row">
                           <label>검색어</label>
                           <div class="search_bar wd100">
                              <div class="inp_st1_search">
                                 <input class="inp_st1 wd100" placeholder="검색어를 입력해주세요" type="text" maxlength="200">
                                 <button type="button">검색</button>
                              </div>
                           </div>
                           <button type="button" class="btn btn-md btn-black">검색</button>
                        </div>
                     </div>

                     <div class="table_set">
                        <div class="flex align_end flex_between">
                           <div class="list_meta">
                              <span class="list_total">총 <strong>10</strong>건</span>
                           </div>
                           <a href="" class="btn btn-sm btn-line">
                              <span class="icon-box"><i class="icon icon-download"></i></span>엑셀 다운로드
                           </a>
                        </div>
                        <div class="table_wrap wd100 mt10">
                           <table class="table_st2">
                              <thead>
                                 <tr>
                                    <th class="c5"><input type="checkbox"></th>
                                    <th class="c8">번호</th>
                                    <th class="c15">카테고리</th>
                                    <th>제목</th>
                                    <th class="c10">조회수</th>
                                    <th class="c15">등록일</th>
                                 </tr>
                              </thead>
                              <tbody>
                                 <tr>
                                    <td><input type="checkbox"></td>
                                    <td>10</td>
                                    <td>교육자료</td>
                                    <td><div class="tit"><a href="adminArchive_board.html" class="txt-over1">2026 세미나 관련 교육자료 공유</a></div></td>
                                    <td>500</td>
                                    <td>2026-06-10</td>
                                 </tr>
                                 <tr>
                                    <td><input type="checkbox"></td>
                                    <td>9</td>
                                    <td>교육자료</td>
                                    <td><div class="tit"><a href="adminArchive_board.html" class="txt-over1">2026 세미나 관련 교육자료 공유</a></div></td>
                                    <td>500</td>
                                    <td>2026-06-10</td>
                                 </tr>
                                 <tr>
                                    <td><input type="checkbox"></td>
                                    <td>1</td>
                                    <td>매뉴얼</td>
                                    <td><div class="tit"><a href="adminArchive_board.html" class="txt-over1">2026 세미나 관련 교육자료 공유</a></div></td>
                                    <td>500</td>
                                    <td>2026-06-10</td>
                                 </tr>
                              </tbody>
                           </table>
                        </div>
                     </div>
                  </div>
               </div>
            </div>
         </div>
      </div>
      <script>loadAdminMenu();</script>

</html>
