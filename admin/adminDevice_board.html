<!DOCTYPE html>
<html lang="ko">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>인천 ICT 이노베이션스퀘어 | 디바이스 신청 상세</title>
      <meta name="description" content="인천 ICT 이노베이션스퀘어 관리자 시스템">
      <link rel="stylesheet" href="/resource/css/reset.css">
      <link rel="stylesheet" href="/resource/css/layout.css">
      <link rel="stylesheet" href="/resource/css/component.css">
      <link rel="stylesheet" href="/resource/css/admin.css">
      <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
      <script src="/resource/js/common.js"></script>
   </head>
   <body>
      <div class="admin-wrap">
         <div class="side-wrap" id="menu"></div>

         <div class="main">
            <header class="flex w-full">
               <div class="breadcrumb">
                  <a href="adminDevice.html">디바이스 신청 내역</a>
                  <span class="icon-box s16"><i class="icon icon-chevron_right"></i></span>
                  <span>신청 상세</span>
               </div>
               <div class="btn_wrap">
                  <button type="button" class="btn btn-xs btn-text">ICT 메인페이지</button>
                  <button type="button" class="btn btn-xs btn-black">로그아웃</button>
               </div>
            </header>

            <div class="main_wrap">
               <div class="inner2">
                  <div class="main_tit">
                     <h2>디바이스 신청 상세</h2>
                  </div>
                  <div class="sect_cont">

                     <!-- 신청 정보 -->
                     <div class="form_table">
                        <table class="table_form">
                           <tbody>
                              <tr>
                                 <th>카테고리</th>
                                 <td>노트북</td>
                              </tr>
                              <tr>
                                 <th>디바이스명</th>
                                 <td>LG전자 그램 Pro AI 16</td>
                              </tr>
                              <tr>
                                 <th>신청자</th>
                                 <td>
                                    <span>이낭동</span>
                                    <span class="ml10">namdong@gmail.com</span>
                                 </td>
                              </tr>
                              <tr>
                                 <th>사용 예약일</th>
                                 <td>2026-06-30</td>
                              </tr>
                              <tr>
                                 <th>예약 시간</th>
                                 <td>09:00 ~ 11:00</td>
                              </tr>
                              <tr>
                                 <th>신청일</th>
                                 <td>2026-06-12</td>
                              </tr>
                              <tr>
                                 <th>신청 내용</th>
                                 <td class="td_content">외부 발표 준비를 위해 노트북이 필요하여 신청합니다. 발표 자료 작업 및 화상 회의 활용 예정입니다.</td>
                              </tr>
                           </tbody>
                        </table>
                     </div>

                     <!-- 처리 정보 -->
                     <div class="form_table mt20">
                        <table class="table_form">
                           <tbody>
                              <tr>
                                 <th>처리 상태</th>
                                 <td>
                                    <select class="inp_st1">
                                       <option value="receipt">접수</option>
                                       <option value="accept">승인 완료</option>
                                       <option value="reject">반려</option>
                                       <option value="cancel">취소</option>
                                    </select>
                                    <span class="txt_info ml10">* 반려 시 아래 사유를 반드시 입력해주세요</span>
                                 </td>
                              </tr>
                              <tr>
                                 <th>기기 정보</th>
                                 <td>
                                    <div class="form_inp_row">
                                       <input type="text" class="inp_st1" value="LG전자 그램 Pro AI 16">
                                       <input type="text" class="inp_st1" placeholder="관리반호 입력하기">
                                    </div>
                                 </td>
                              </tr>
                              <tr>
                                 <th>처리 사유</th>
                                 <td><textarea class="inp_st1 wd100" rows="4" placeholder="반려 또는 취소 사유를 입력해주세요 (승인 시 생략 가능)"></textarea></td>
                              </tr>
                              <tr>
                                 <th>반납 상태</th>
                                 <td>
                                    <select class="inp_st1">
                                       <option value="receipt">반납 대기</option>
                                       <option value="accept">반납 완료</option>
                                       <option value="reject">미반납</option>
                                    </select>
                                 </td>
                              </tr>
                              <tr>
                                 <th>승인자</th>
                                 <td><input type="text" class="inp_st1" value="관리자"></td>
                              </tr>
                              <tr>
                                 <th>처리일</th>
                                 <td>-</td>
                              </tr>
                           </tbody>
                        </table>
                     </div>

                     <div class="btn_wrap flex_end mt20">
                        <button type="button" class="btn btn-md btn-line" onclick="history.back()">목록</button>
                        <button type="button" class="btn btn-md btn-black">저장</button>
                     </div>
                  </div>
               </div>
            </div>
         </div>
      </div>
      <script>loadAdminMenu();</script>
   </body>
</html>
