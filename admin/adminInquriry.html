<!DOCTYPE html>
<html lang="ko">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>인천 ICT 이노베이션스퀘어 | 온라인 문의</title>
      <meta name="description" content="인천 ICT 이노베이션스퀘어 관리자 시스템">
      <link rel="stylesheet" href="/resource/css/reset.css">
      <link rel="stylesheet" href="/resource/css/layout.css">
      <link rel="stylesheet" href="/resource/css/component.css">
      <link rel="stylesheet" href="/resource/css/admin.css">
      <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
      <script src="/resource/js/common.js"></script>
   </head>
   <body>
      <div class="admin-wrap">
         <div class="side-wrap" id="menu"></div>

         <div class="main">
            <header class="flex w-full">
               <div class="btn_wrap">
                  <button type="button" class="btn btn-xs btn-text">ICT 메인페이지</button>
                  <button type="button" class="btn btn-xs btn-black">로그아웃</button>
               </div>
            </header>

            <div class="main_wrap">
               <div class="inner2">
                  <div class="main_tit">
                     <h2>온라인 문의</h2>
                  </div>
                  <div class="sect_cont">
                     <div class="filter_box">
                        <div class="filter_row">
                           <div class="select_box">
                              <label>구분</label>
                              <select class="inp_st1">
                                 <option value="">전체</option>
                                 <option value="program">프로그램</option>
                                 <option value="space">공간 예약</option>
                                 <option value="device">디바이스</option>
                              </select>
                           </div>
                           <div class="select_box">
                              <label>상태</label>
                              <select class="inp_st1">
                                 <option value="">전체</option>
                                 <option value="waiting">답변 대기</option>
                                 <option value="inprogress">확인 중</option>
                                 <option value="done">답변 완료</option>
                              </select>
                           </div>
                        </div>
                        <div class="filter_row">
                           <label>문의 등록일</label>
                           <div class="date_box">
                              <input class="input_date inp_st1" type="date">
                              <p class="hyp">~</p>
                              <input class="input_date inp_st1" type="date">
                           </div>
                        </div>
                        <div class="filter_row">
                           <label>검색어</label>
                           <div class="search_bar wd100">
                              <div class="inp_st1_search">
                                 <input class="inp_st1 wd100" placeholder="검색어를 입력해주세요" type="text" maxlength="200">
                                 <button type="button">검색</button>
                              </div>
                           </div>
                           <button type="button" class="btn btn-md btn-black">검색</button>
                        </div>
                     </div>

                     <div class="table_set">
                        <div class="flex align_end flex_between">
                           <div class="list_meta">
                              <span class="list_total">총 <strong>10</strong>건</span>
                           </div>
                           <a href="" class="btn btn-sm btn-line">
                              <span class="icon-box"><i class="icon icon-download"></i></span>엑셀 다운로드
                           </a>
                        </div>
                        <div class="table_wrap wd100 mt10">
                           <table class="table_st2">
                              <thead>
                                 <tr>
                                    <th class="c5"><input type="checkbox"></th>
                                    <th class="c8">번호</th>
                                    <th class="c10">구분</th>
                                    <th>제목</th>
                                    <th class="c10">문의자</th>
                                    <th class="c15">등록일</th>
                                    <th class="c8">처리 상태</th>
                                 </tr>
                              </thead>
                              <tbody>
                                 <tr>
                                    <td><input type="checkbox"></td>
                                    <td>10</td>
                                    <td>프로그램</td>
                                    <td><div class="tit"><a href="adminInquriry_board.html" class="txt-over1">프로그램 단체 참여 문의</a></div></td>
                                    <td>김인천</td>
                                    <td>2026-06-10</td>
                                    <td><span class="tag tag-red">답변 대기</span></td>
                                 </tr>
                                 <tr>
                                    <td><input type="checkbox"></td>
                                    <td>9</td>
                                    <td>공간 예약</td>
                                    <td><div class="tit"><a href="adminInquriry_board.html" class="txt-over1">송도 교육장 일주일 간 대여 문의</a></div></td>
                                    <td>김인천</td>
                                    <td>2026-06-10</td>
                                    <td><span class="tag tag-red">답변 대기</span></td>
                                 </tr>
                                 <tr>
                                    <td><input type="checkbox"></td>
                                    <td>6</td>
                                    <td>프로그램</td>
                                    <td><div class="tit"><a href="adminInquriry_board.html" class="txt-over1">프로그램 단체 참여 문의</a></div></td>
                                    <td>김인천</td>
                                    <td>2026-06-10</td>
                                    <td><span class="tag tag-orange">확인 중</span></td>
                                 </tr>
                                 <tr>
                                    <td><input type="checkbox"></td>
                                    <td>1</td>
                                    <td>공간 예약</td>
                                    <td><div class="tit"><a href="adminInquriry_board.html" class="txt-over1">공간 예약 사용인원 선택</a></div></td>
                                    <td>김인천</td>
                                    <td>2026-06-10</td>
                                    <td><span class="tag tag-gray">답변 완료</span></td>
                                 </tr>
                              </tbody>
                           </table>
                        </div>
                     </div>
                  </div>
               </div>
            </div>
         </div>
      </div>
      <script>loadAdminMenu();</script>
   </body>
</html>
