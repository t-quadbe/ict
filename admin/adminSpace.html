<!DOCTYPE html>
<html lang="ko">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>인천 ICT 이노베이션스퀘어 | 공간 신청 내역</title>
      <meta name="description" content="인천 ICT 이노베이션스퀘어 관리자 시스템">
      <link rel="stylesheet" href="/resource/css/reset.css">
      <link rel="stylesheet" href="/resource/css/layout.css">
      <link rel="stylesheet" href="/resource/css/component.css">
      <link rel="stylesheet" href="/resource/css/admin.css">
      <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
      <script src="/resource/js/common.js"></script>
   </head>
   <body>
      <div class="admin-wrap">
         <div class="side-wrap" id="menu"></div>

         <div class="main">
            <header class="flex w-full">
               <div class="btn_wrap">
                  <button type="button" class="btn btn-xs btn-text">ICT 메인페이지</button>
                  <button type="button" class="btn btn-xs btn-black">로그아웃</button>
               </div>
            </header>

            <div class="main_wrap">
               <div class="inner2">
                  <div class="main_tit">
                     <h2>공간 신청 내역</h2>
                  </div>
                  <div class="sect_cont">
                     <div class="filter_box">
                        <div class="filter_row">
                           <div class="select_box">
                              <label>거점 구분</label>
                              <select class="inp_st1">
                                 <option value="">전체</option>
                                 <option value="songdo">송도 교육장</option>
                                 <option value="namdong">남동 ICT 콤플렉스</option>
                                 <option value="michuhol">미추홀 교육장</option>
                              </select>
                           </div>
                           <div class="select_box">
                              <label>상태</label>
                              <select class="inp_st1">
                                 <option value="0">전체</option>
                                 <option value="1">승인 대기</option>
                                 <option value="2">승인 완료</option>
                              </select>
                           </div>
                        </div>
                        <div class="filter_row">
                           <label>예약일</label>
                           <div class="date_box">
                              <input class="input_date inp_st1" type="date">
                              <p class="hyp">~</p>
                              <input class="input_date inp_st1" type="date">
                           </div>
                        </div>
                        <div class="filter_row">
                           <label>검색어</label>
                           <div class="search_bar wd100">
                              <div class="inp_st1_search">
                                 <input class="inp_st1 wd100" placeholder="이름, 공간명 검색" type="text" maxlength="200">
                                 <button type="button">검색</button>
                              </div>
                           </div>
                           <button type="button" class="btn btn-md btn-black">검색</button>
                        </div>
                     </div>

                     <div class="table_set">
                        <div class="flex align_end flex_between">
                           <div class="list_meta">
                              <span class="list_total">총 <strong>10</strong>건</span>
                           </div>
                           <a href="" class="btn btn-sm btn-line">
                              <span class="icon-box"><i class="icon icon-download"></i></span>엑셀 다운로드
                           </a>
                        </div>
                        <div class="table_wrap wd100 mt10">
                           <table class="table_st2">
                              <thead>
                                 <tr>
                                    <th class="c8">번호</th>
                                    <th class="c12">거점</th>
                                    <th>공간명</th>
                                    <th class="c10">이름</th>
                                    <th class="c10">신청목적</th>
                                    <th class="c12">사용 예약일</th>
                                    <th class="c15">예약 시간</th>
                                    <th class="c12">신청일</th>
                                    <th class="c10">처리 상태</th>
                                    <th class="c10">승인자</th>
                                    <th class="c12">처리일</th>
                                 </tr>
                              </thead>
                              <tbody>
                                 <tr>
                                    <td>8</td>
                                    <td>미추홀 교육장</td>
                                    <td><a class="tit" href="adminSpace_board.html">커뮤니티 라운지</a></td>
                                    <td>이낭동</td>
                                    <td>회의</td>
                                    <td>2026-06-30</td>
                                    <td>09:00 ~ 11:00</td>
                                    <td>2026-06-12</td>
                                    <td><span class="tag tag-green">승인 완료</span></td>
                                    <td>관리자</td>
                                    <td>2026-06-12</td>
                                 </tr>
                              </tbody>
                           </table>
                        </div>
                     </div>
                  </div>
               </div>
            </div>
         </div>
      </div>
      <script>loadAdminMenu();</script>
   </body>
</html>
