<!DOCTYPE html>
<html lang="ko">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>인천 ICT 이노베이션스퀘어 | 관리자 설정</title>
      <meta name="description" content="인천 ICT 이노베이션스퀘어 관리자 시스템">
      <link rel="stylesheet" href="../resource/css/reset.css">
      <link rel="stylesheet" href="../resource/css/layout.css">
      <link rel="stylesheet" href="../resource/css/component.css">
      <link rel="stylesheet" href="../resource/css/admin.css">
      <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
      <script src="../resource/js/common.js"></script>
   </head>
   <body>
      <div class="admin-wrap">
         <div class="side-wrap" id="menu"></div>

         <div class="main">
            <header class="flex w-full">
               <div class="btn_wrap">
                  <button type="button" class="btn btn-xs btn-text">ICT 메인페이지</button>
                  <button type="button" class="btn btn-xs btn-black">로그아웃</button>
               </div>
            </header>

            <div class="main_wrap">
               <div class="inner2">
                  <div class="main_tit flex_between">
                     <h2>관리자 설정</h2>
                     <a href="adminBaseSet_board.html" class="btn btn-md btn-black">관리자 계정 추가 +</a>
                  </div>
                  <div class="sect_cont">
                     <div class="filter_box">
                        <div class="filter_row">
                           <div class="select_box">
                              <label>구분</label>
                              <select class="inp_st1">
                                 <option value="">전체</option>
                                 <option value="super">슈퍼 관리자</option>
                                 <option value="sub">부분 관리자</option>
                              </select>
                           </div>
                        </div>
                        <div class="filter_row">
                           <label>검색어</label>
                           <div class="search_bar wd100">
                              <div class="inp_st1_search">
                                 <input class="inp_st1 wd100" placeholder="이름, 이메일, 아이디 검색" type="text" maxlength="200">
                                 <button type="button">검색</button>
                              </div>
                           </div>
                           <button type="button" class="btn btn-md btn-black">검색</button>
                        </div>
                     </div>

                     <div class="table_set">
                        <div class="flex align_end flex_between">
                           <div class="list_meta">
                              <span class="list_total">총 <strong>10</strong>건</span>
                           </div>
                           <a href="" class="btn btn-sm btn-line">
                              <span class="icon-box"><i class="icon icon-download"></i></span>엑셀 다운로드
                           </a>
                        </div>
                        <div class="table_wrap wd100 mt10">
                           <table class="table_st2">
                              <thead>
                                 <tr>
                                    <th class="c5"><input type="checkbox"></th>
                                    <th class="c8">번호</th>
                                    <th class="c10">이름</th>
                                    <th class="c10">권한</th>
                                    <th class="c10">구분</th>
                                    <th class="c10">부서명</th>
                                    <th>아이디(이메일)</th>
                                    <th class="c12">연락처</th>
                                    <th class="c12">이메일주소</th>
                                    <th class="c12">등록일</th>
                                 </tr>
                              </thead>
                              <tbody>
                                 <tr>
                                    <td><input type="checkbox"></td>
                                    <td>10</td>
                                    <td>이남동</td>
                                    <td>슈퍼 관리자</td>
                                    <td>전체</td>
                                    <td>운영팀</td>
                                    <td><a class="tit" href="adminBaseSet_board.html">namdong.lee@gmail.com</a></td>
                                    <td>010-1234-5678</td>
                                    <td>lnd@ict.com</td>
                                    <td>2026-06-10</td>
                                 </tr>
                              </tbody>
                           </table>
                        </div>
                     </div>
                  </div>
               </div>
            </div>
         </div>
      </div>
      <script>loadAdminMenu();</script>
   </body>
</html>
