<!DOCTYPE html>
<html lang="ko">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>인천 ICT 이노베이션스퀘어 | 문의 답변</title>
      <meta name="description" content="인천 ICT 이노베이션스퀘어 관리자 시스템">
      <link rel="stylesheet" href="../resource/css/reset.css">
      <link rel="stylesheet" href="../resource/css/layout.css">
      <link rel="stylesheet" href="../resource/css/component.css">
      <link rel="stylesheet" href="../resource/css/admin.css">
      <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
      <script src="../resource/js/common.js"></script>
   </head>
   <body>
      <div class="admin-wrap">
         <div class="side-wrap" id="menu"></div>

         <div class="main">
            <header class="flex w-full">
               <div class="breadcrumb">
                  <a href="adminInquriry.html">온라인 문의</a>
                  <span class="icon-box s16"><i class="icon icon-chevron_right"></i></span>
                  <span>문의 답변</span>
               </div>
               <div class="btn_wrap">
                  <button type="button" class="btn btn-xs btn-text">ICT 메인페이지</button>
                  <button type="button" class="btn btn-xs btn-black">로그아웃</button>
               </div>
            </header>

            <div class="main_wrap">
               <div class="inner2">
                  <div class="main_tit">
                     <h2>문의 답변</h2>
                  </div>
                  <div class="sect_cont">
                     <div class="form_table">
                        <table class="table_form">
                           <tbody>
                              <tr>
                                 <th>문의 유형</th>
                                 <td>
                                    <select class="inp_st1">
                                       <option>프로그램</option>
                                       <option>공간 예약</option>
                                       <option>디바이스</option>
                                    </select>
                                 </td>
                              </tr>
                              <tr>
                                 <th>문의자 이름</th>
                                 <td>
                                    <span>김인천</span>
                                    <span class="ml10">kimincheon@gmail.com</span>
                                 </td>
                              </tr>
                              <tr>
                                 <th>제목</th>
                                 <td>프로그램 참여 문의</td>
                              </tr>
                              <tr>
                                 <th>내용</th>
                                 <td class="td_content">프로그램 참여 문의</td>
                              </tr>
                              <tr>
                                 <th>등록일</th>
                                 <td>2026-10-24</td>
                              </tr>
                           </tbody>
                        </table>
                     </div>

                     <div class="form_table mt20">
                        <table class="table_form">
                           <tbody>
                              <tr>
                                 <th>처리 상태</th>
                                 <td>
                                    <select class="inp_st1">
                                       <option>확인 중</option>
                                       <option>답변 완료</option>
                                    </select>
                                    <span class="txt_info ml10">* 확인이나 시간이 소요될 경우 '확인 중' 으로 체크해 주세요</span>
                                 </td>
                              </tr>
                              <tr>
                                 <th>답변</th>
                                 <td><textarea class="inp_st1 wd100" rows="5" placeholder="답변 내용을 입력해주세요"></textarea></td>
                              </tr>
                              <tr>
                                 <th>담당자</th>
                                 <td>관리자</td>
                              </tr>
                           </tbody>
                        </table>
                     </div>

                     <div class="btn_wrap flex_end mt20">
                        <button type="button" class="btn btn-md btn-line" onclick="history.back()">취소</button>
                        <button type="button" class="btn btn-md btn-black">저장</button>
                     </div>
                  </div>
               </div>
            </div>
         </div>
      </div>
      <script>loadAdminMenu();</script>
   </body>
</html>
