                  <!-- ===== 우측 콘텐츠 영역 ===== -->

                     <!-- 유의사항 -->

                     <div class="detail_wrap">
                        <div class="detail_left">
                           <div class="detail_thumb">

                              <tbody>
                                 <tr>

                                 </tr>
                                 <tr>
                                    <th>수용인원</th>
                                    <td>최대 12명</td>
                                 </tr>
                                 <tr>
                                    <th>예약가능시간</th>

                                 </tr>

                        </div>

                        <div class="detail_right">
                           <p class="calendar_section_title">날짜 및 시간 선택</p>

                           <!-- 달력 -->
                           <div class="calendar_wrap">
                              <div class="calendar_header">
                                 <button type="button" class="icon-box" id="prevMonth">
                                    <i class="icon icon-chevron_left"></i>
                                 </button>
                                 <strong id="calendarTitle">2026년 03월</strong>
                                 <button type="button" class="icon-box" id="nextMonth">
                                    <i class="icon icon-chevron_right"></i>
                                 </button>
                              </div>
                              <table class="calendar_table" id="calendarTable">
                                 <thead>
                                    <tr>
                                       <th>일</th>
                                       <th>월</th>
                                       <th>화</th>
                                       <th>수</th>
                                       <th>목</th>
                                       <th>금</th>
                                       <th>토</th>
                                    </tr>
                                 </thead>
                                 <tbody id="calendarBody">
                                 </tbody>
                              </table>
                           </div>

                           <!-- 시간 슬롯 -->
                           <div class="list list_st1 gap8 mb20" id="timeSlots">
                              <button type="button" class="btn time-btn disabled">09:00 - 10:00</button>
                              <button type="button" class="btn time-btn disabled">10:00 - 11:00</button>
                              <button type="button" class="btn time-btn">11:00 - 12:00</button>
                              <button type="button" class="btn time-btn active">13:00 - 14:00</button>
                              <button type="button" class="btn time-btn">17:00 - 18:00</button>
                              <button type="button" class="btn time-btn">16:00 - 17:00</button>
                              <button type="button" class="btn time-btn disabled">18:00 - 19:00</button>
                              <button type="button" class="btn time-btn">15:00 - 16:00</button>
                              <button type="button" class="btn time-btn">14:00 - 15:00</button>
                           </div>

                           <!-- 예약하기 버튼 -->

                  </main>
               </div>
            </div>
         </div>

         <footer id="ft"></footer>
      </div>

      <script>
         let current = new Date();
         let selectedDate = null;

         const title = document.getElementById('calendarTitle');
         const body = document.getElementById('calendarBody');

         function render() {
            const year = current.getFullYear();
            const month = current.getMonth();

            title.textContent = `${year}년 ${String(month + 1).padStart(2, '0')}월`;

            const firstDay = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            let html = '';
            let day = 1;

            for (let row = 0; row < 6; row++) {
               html += '<tr>';

               for (let col = 0; col < 7; col++) {

                  if ((row === 0 && col < firstDay) || day > lastDate) {
                     html += '<td></td>';
                     continue;
                  }

                  const date = new Date(year, month, day);

                  let cls = 'cal_day';

                  // 일요일
                  if (col === 0) cls += ' sun';

                  // 토요일
                  if (col === 6) cls += ' sat';

                  // 지난 날짜 비활성화
                  if (date < today) {
                     cls += ' disabled';
                  }

                  // 선택 날짜
                  if (
                     selectedDate &&
                     date.toDateString() === selectedDate.toDateString()
                  ) {
                     cls += ' active';
                  }

                  html += `
                     <td>
                        <span
                           class="${cls}"
                           data-year="${year}"
                           data-month="${month}"
                           data-day="${day}">
                           ${day}
                        </span>
                     </td>
                  `;

                  day++;
               }

               html += '</tr>';

               if (day > lastDate) break;
            }

            body.innerHTML = html;

            body.querySelectorAll('.cal_day:not(.disabled)').forEach(el => {
               el.addEventListener('click', () => {

                  selectedDate = new Date(
                     Number(el.dataset.year),
                     Number(el.dataset.month),
                     Number(el.dataset.day)
                  );

                  render();
               });
            });
         }

         document.getElementById('prevMonth').addEventListener('click', () => {
            current.setMonth(current.getMonth() - 1);
            render();
         });

         document.getElementById('nextMonth').addEventListener('click', () => {
            current.setMonth(current.getMonth() + 1);
            render();
         });

         render();

         // 시간 선택
         document.querySelectorAll('.time-btn:not(.disabled)').forEach(btn => {
            btn.addEventListener('click', () => {

               document.querySelectorAll('.time-btn')
                  .forEach(item => item.classList.remove('active'));

               btn.classList.add('active');
            });
         });
      </script>
   </body>
