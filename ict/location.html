                  <!-- ===== 우측 콘텐츠 영역 ===== -->

                     <!-- 거점 탭 버튼 -->
                     <div class="tab_st2 wd100 mb15">

                           <li>
                               <button class="btn active" data-tab="namdong" role="tab" aria-selected="true">남동 ICT 콤플렉스</button>
                           </li>
                           <li>
                               <button class="btn" data-tab="michuhol" role="tab" aria-selected="false">미추홀 교육장</button>
                           </li>

                           </li>
                        </ul>
                     </div>

                     <!-- 지도 -->
                     <div class="location_map_wrap">
                        <iframe id="locationMap" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3166.8102177568408!2d126.71094099999999!3d37.4652026!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x357b7bf6bec97ae9%3A0x3f826402285f14f3!2z7J247LKc6rSR7Jet7IucIOuCqOuPmeq1rCDrsLHrspTroZwgMzU3!5e0!3m2!1sko!2skr!4v1782461628943!5m2!1sko!2skr" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                     </div>

                     <!-- 교통 정보 -->
                     <div class="location_info_list mt15" id="locationInfoList">
                        <!-- JS로 렌더링 -->
                     </div>

                     <div class="guide_box mt30">
                        <div class="guide_inner align_center">
                           <span class="icon-box st3 s96">
                              <i class="icon-line icon-call_line"></i>
                           </span>
                           <div class="txt_box">
                              <strong>대표 문의</strong>
                              <ol class="notice_box_list st2 mg0">
                                 <li>전화: 032-260-2105</li>
                                 <li>이메일: sgc@itp.or.kr</li>
                              </ol>
                           </div>
                           <div class="plus_info">
                              <span class="icon-box">
                                 <i class="icon icon-information"></i>
                              </span>

                           </div>
                        </div>
                     </div>
                  </main>
               </div>
            </div>
         </div>

         <footer id="ft"></footer>
      </div>

      <script>
         // ===== 거점별 데이터 =====
         var locationData = {
            namdong: {
               mapSrc: 'https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3166.8102177568408!2d126.71094099999999!3d37.4652026!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x357b7bf6bec97ae9%3A0x3f826402285f14f3!2z7J247LKc6rSR7Jet7IucIOuCqOuPmeq1rCDrsLHrspTroZwgMzU3!5e0!3m2!1sko!2skr!4v1782461628943!5m2!1sko!2skr',
               info: [
                  {
                     icon: 'icon-mappin_aw_fill',
                     title: '위치 안내',
                     content: '<span class="txt">인천광역시 남동구 간석3동 백범로 357 인천회관 3층</span>'
                  },
                  {
                     icon: 'icon-bus',
                     title: '버스 이용 시',
                     content: '<div class="trans"><span class="badge blue">간선</span><span class="txt">15, 30, 34, 62, 103-1, 303-1</span></div><div class="trans"><span class="badge green">마을</span><span class="txt">538, 533, 534</span></div>'
                  },
                  {
                     icon: 'icon-subway',
                     title: '지하철 이용 시',
                     content: '<div class="trans"><span class="badge blue round">인천 1호선</span><span class="txt"><b>인천 1호선</b> 간석오거리역 3번 출구 244m</span></div>'
                  }
               ]
            },
            michuhol: {
               mapSrc: 'https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3164.123456789012!2d126.6500000000000!3d37.4700000000000!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x357b7c0000000001%3A0x0000000000000001!2z66as7Leo7ZSE7IKs64KY67KE7IiY7KCc7ZqM!5e0!3m2!1sko!2skr!4v1782200347175!5m2!1sko!2skr',
               info: [
                  {
                     icon: 'icon-mappin_aw_fill',
                     title: '위치 안내',
                     content: '<span class="txt">인천광역시 미추홀구 도화동 592-5 인천IT타워 16층</span>'
                  },
                  {
                     icon: 'icon-bus',
                     title: '버스 이용 시',
                     content: '<div class="trans"><span class="badge blue">간선</span><span class="txt">2, 4, 15, 21, 22, 23, 33, 63</span></div>'
                  },
                  {
                     icon: 'icon-subway',
                     title: '지하철 이용 시',
                     content: '<div class="trans"><span class="badge blue round">1호선</span><span class="txt"><b>1호선</b> 도화역 1번 출구 도보 5분</span></div>'
                  }
               ]
            },
            songdo: {
               mapSrc: 'https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3167.000000000000!2d126.6300000000000!3d37.3800000000000!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x357b7c0000000002%3A0x0000000000000002!2z7IaU65GQ6rOg7KCc7ZqM!5e0!3m2!1sko!2skr!4v1782200347176!5m2!1sko!2skr',
               info: [
                  {
                     icon: 'icon-mappin_aw_fill',
                     title: '위치 안내',
                     content: '<span class="txt">인천광역시 연수구 송도문화로 119</span>'
                  },
                  {
                     icon: 'icon-bus',
                     title: '버스 이용 시',
                     content: '<div class="trans"><span class="badge blue">간선</span><span class="txt">16</span></div><div class="trans"><span class="badge green">마을</span><span class="txt">4403, 순환41, 순환42</span></div>'
                  },
                  {
                     icon: 'icon-subway',
                     title: '지하철 이용 시',
                     content: '<div class="trans"><span class="badge blue round">인천 1호선</span><span class="txt"><b>수인분당선</b> 테크노파크역 도보 20분</span></div>'
                  }
               ]
            }
         };

         // ===== 렌더링 함수 =====
         function renderLocationInfo(tab) {
            var data = locationData[tab];
            if (!data) return;

            // iframe 교체
            document.getElementById('locationMap').src = data.mapSrc;

            // 교통 정보 렌더링
            var html = '';
            data.info.forEach(function(item) {
               html += '<div class="info_item">'
                  + '<div class="info_tit">'
                  + '<span class="icon-box st3 s48"><i class="icon ' + item.icon + '"></i></span>'
                  + '<p>' + item.title + '</p>'
                  + '</div>'
                  + '<div class="info_cont">' + item.content + '</div>'
                  + '</div>';
            });
            document.getElementById('locationInfoList').innerHTML = html;
         }

         // ===== 탭 버튼 이벤트 =====
         document.querySelectorAll('.tab_btn3 .btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
               document.querySelectorAll('.tab_btn3 .btn').forEach(function(b) {
                  b.classList.remove('active');
                  b.setAttribute('aria-selected', 'false');
               });
               this.classList.add('active');
               this.setAttribute('aria-selected', 'true');
               renderLocationInfo(this.dataset.tab);
            });
         });

         // ===== URL 해시로 초기 탭 지정 지원 (#namdong / #michuhol / #songdo) =====
         (function() {
            var hash = window.location.hash.replace('#', '');
            var validTabs = ['namdong', 'michuhol', 'songdo'];
            var initTab = validTabs.indexOf(hash) !== -1 ? hash : 'namdong';

            // 탭 active 설정
            document.querySelectorAll('.tab_btn3 .btn').forEach(function(btn) {
               var isTarget = btn.dataset.tab === initTab;
               btn.classList.toggle('active', isTarget);
               btn.setAttribute('aria-selected', isTarget ? 'true' : 'false');
            });

            renderLocationInfo(initTab);
         })();
      </script>
   </body>
</html>
