<!DOCTYPE html>
<html lang="ko">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>인천 ICT 이노베이션스퀘어</title>

      <meta name="description" content="인천 ICT 이노베이션스퀘어는 AI, 블록체인 등 4차 산업 핵심 기술 인재 양성을 위한 전문 교육과 취업 지원 서비스를 제공합니다.">
      <meta property="og:type" content="website">
      <meta property="og:url" content="">
      <meta property="og:title" content="인천 ICT 이노베이션스퀘어">
      <meta property="og:description" content="인천 ICT 이노베이션스퀘어는 AI, 블록체인 등 4차 산업 핵심 기술 인재 양성을 위한 전문 교육과 취업 지원 서비스를 제공합니다.">
      <meta property="og:image" content="./resource/images/main_thumb.webp">
      <meta name="twitter:card" content="summary_large_image">

      <link rel="shortcut icon" href="./resource/images/favicon.ico" type="image/x-icon">
      <link rel="stylesheet" href="./resource/css/reset.css">
      <link rel="stylesheet" href="./resource/css/layout.css">
      <link rel="stylesheet" href="./resource/css/component.css">
      <link rel="stylesheet" href="./resource/css/sub.css">

      <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
      <script src="./resource/js/common.js"></script>
   </head>

   <body>
      <div id="wrap">
         <!-- header -->
         <header id="hd"></header>

         
         <!-- 콘텐츠 영역 -->
         <div id="content" class="container">
            <!-- 콘텐츠 영역 -->
            <main class="content main">

               <div class="login_wrap">
                  <h1 class="">로그인</h1>

                  <form action="">
                     <div class="inp_wrap">
                        <input type="text" class="inp_st1 wd100" placeholder="이메일 주소를 입력해주세요">
                     </div>
                     <div class="inp_wrap password_wrap">
                        <input type="password" id="password" class="inp_st1 wd100" placeholder="비밀번호를 입력해주세요">

                         <button type="button" class="icon-box" id="togglePassword">
                           <i class="icon icon-eye"></i>
                        </button>
                     </div>
                  </form>
                  
                  <div class="login_util">
                        <a href="/findID.html">아이디 찾기</a>
                        <a href="/findPW.html">비밀번호 찾기</a>
                  </div>

                   <div class="btn_wrap">
                        <button class="btn btn-lg btn-main">로그인</button>
                        <a href="/signup.html" class="btn btn-lg btn-line-primary">회원가입</a>
                  </div>
               </div>
            

            </main>
         </div>


         <footer id="ft"></footer>
      </div>

      <script>
         const password = document.getElementById("password");
         const togglePassword = document.getElementById("togglePassword");

         togglePassword.addEventListener("click", () => {

            const icon = togglePassword.querySelector("i");

            if (password.type === "password") {
               password.type = "text";
               icon.classList.remove("icon-eye");
               icon.classList.add("icon-eye-slash");
            } else {
               password.type = "password";
               icon.classList.remove("icon-eye-slash");
               icon.classList.add("icon-eye");
            }

         });
      </script>
   </body>
</html>
