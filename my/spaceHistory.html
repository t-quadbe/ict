<!DOCTYPE html>
<html lang="ko">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>인천 ICT 이노베이션스퀘어</title>

      <meta name="description" content="인천 ICT 이노베이션스퀘어는 AI, 블록체인 등 4차 산업 핵심 기술 인재 양성을 위한 전문 교육과 취업 지원 서비스를 제공합니다.">
      <meta property="og:type" content="website">
      <meta property="og:url" content="">
      <meta property="og:title" content="인천 ICT 이노베이션스퀘어">
      <meta property="og:description" content="인천 ICT 이노베이션스퀘어는 AI, 블록체인 등 4차 산업 핵심 기술 인재 양성을 위한 전문 교육과 취업 지원 서비스를 제공합니다.">
      <meta property="og:image" content="./resource/images/main_thumb.webp">
      <meta name="twitter:card" content="summary_large_image">

      <link rel="shortcut icon" href="./resource/images/favicon.ico" type="image/x-icon">
      <link rel="stylesheet" href="./resource/css/reset.css">
      <link rel="stylesheet" href="./resource/css/layout.css">
      <link rel="stylesheet" href="./resource/css/component.css">
      <link rel="stylesheet" href="./resource/css/sub.css">

      <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
      <script src="./resource/js/common.js"></script>
   </head>

   <body>
      <div id="wrap">
         <!-- header -->
         <header id="hd"></header>

         <!-- 콘텐츠 영역 -->
         <div id="content" class="container">
            <!-- 콘텐츠 영역 -->
            <div class="inner2">

               <div class="sub_layout">
                  <!-- ===== 좌측 사이드 메뉴 ===== -->
                  <div class="aside" aria-label="서브 메뉴">
                     <div class="tit">
                        <strong>마이페이지</strong>
                     </div>
                     <ul class="aside_nav_list">
                        <li class="aside_nav_item ">
                           <a href="/my/profile.html">기본 정보</a>
                        </li>
                        <li class="aside_nav_item active">
                           <a href="/my/spaceHistory.html">공간 예약 내역</a>
                        </li>
                        <li class="aside_nav_item">
                           <a href="/my/deviceHistory.html">디바이스 대여 내역</a>
                        </li>
                        <li class="aside_nav_item">
                           <a href="/my/inquiryHistory.html">온라인 문의 내역</a>
                        </li>
                     </ul>
                  </div>

                  <!-- ===== 우측 콘텐츠 영역 ===== -->
                  <main class="sub_content">
                     <div class="sub_page_head">
                        <h4 class="sub_page_tit">공간 예약 내역</h4>
                        <hr class="sub_page_line">
                     </div>

                     <div class="filter_wrap notice">
                        <div class="date_box">
                           <input id="" name="" class="input_date inp_st1" type="date">
                           <p class="hyp">~</p>
                           <input id="" name="" class="input_date inp_st1" type="date">
                        </div>
                        <div class="search_bar">
                           <div class="select_box">
                              <select id="" name="" class="inp_st1">
                                 <option value="">거점 전체</option>
                                 <option value="001">남동 ICT 콤플렉스</option>
                                 <option value="002">미추홀 교육장</option>
                                 <option value="003">송도 교육장</option>
                              </select>
                           </div>
                           <div class="inp_st1_search">
                              <input id="" name="" class="inp_st1 wd100" placeholder="검색어를 입력해주세요" type="text" maxlength="200">
                              <button type="button">검색</button>
                           </div>
                        </div>
                     </div>

                     <div class="list_meta">
                        <span class="list_total">총 <strong>10</strong>건</span>
                     </div>

                     
                     <div class="table_wrap">
                        <table class="table_st1">
                           <thead>
                              <tr>
                                 <th class="c5">번호</th>
                                 <th>공간명</th>
                                 <th class="c20">예약일</th>
                                 <th class="c10">신청일</th>
                                 <th class="c10">처리결과</th>
                              </tr>
                           </thead>
                           <tbody>
                              <tr class="history_row" onclick="openDetailPopup()">
                                 <td>05</td>
                                 <td class="td_tit">
                                    <div class="tit text-ce">
                                       <a class="txt-over1">송도 교육장 컨퍼런스룸</a>
                                    </div>
                                 </td>
                                 <td class="td_date">2026.03.20 10:00 ~ 12:00</td>
                                 <td class="td_date">2026-05-04</td>
                                 <td><span class="tag tag-subblue">승인 대기중</span></td>
                              </tr>
                           </tbody>
                        </table>
                     </div>

                     
                     <!-- 내역 없을시 -->
                     <div class="empty_wrap">
                        <div class="icon-box st3 s96">
                           <i class="icon icon-error_fill"></i>
                        </div>
                        <h4>공간 예약 내역이 없습니다.</h4>
                     </div>

                     <div class="pagination">
                        <div class="pagination_controls">
                           <button type="button" class="arrow_btn arrow_prev">
                              <span class="icon-box">
                                 <i class="icon icon-chevron_left"></i>
                              </span>
                           </button>

                           <div class="page_btn_wrap">
                              <button type="button" class="page_btn active" aria-label="1페이지" aria-current="page">1</button>
                              <button type="button" class="page_btn" aria-label="2페이지">2</button>
                              <button type="button" class="page_btn" aria-label="3페이지">3</button>
                              <button type="button" class="page_btn" aria-label="4페이지">4</button>
                              <button type="button" class="page_btn" aria-label="5페이지">5</button>
                           </div>

                           <button type="button" class="arrow_btn arrow_prev">
                              <span class="icon-box">
                                 <i class="icon icon-chevron_right"></i>
                              </span>
                           </button>
                        </div>
                     </div>
                  </main>
               </div>


            </div>
         </div>
         
         <footer id="ft"></footer>
      </div>

       <!-- ===== 공간 예약 상세 팝업 ===== -->
      <div class="popup_wrap" id="spacePopWrap">
         <div class="popup popup_md">
            <div class="popup_cont">
               <div class="popup_head">
                  <h4>공간 예약 내역</h4>
						<button type="button" class="btn-close" onclick="closeDetailPopup();"><span class="icon-box"><i class="icon icon-x"></i></span></button>
               </div>

               <div class="popup_body">
                  <!-- 기본 정보 -->
                  <div class="form_box">
                     <div class="form_tit">예약 정보</div>
                     <table class="form_table">
                        <tbody>
                           <tr>
                              <th scope="row">공간명</th>
                              <td id="">컨퍼런스룸</td>
                           </tr>
                           <tr>
                              <th scope="row">공간 예약 거점</th>
                              <td id="">송도 교육장</td>
                           </tr>
                           <tr>
                              <th scope="row">사용 인원</th>
                              <td id="">6명</td>
                           </tr>
                           <tr>
                              <th scope="row">예약일</th>
                              <td id="">2026-05-04 10:00 ~ 12:00</td>
                           </tr>
                           <tr>
                              <th scope="row">신청일</th>
                              <td id="">2026-05-01</td>
                           </tr>
                           <tr>
                              <th scope="row">처리결과</th>
                              <td id="">
                                 <span class="tag tag-subblue">승인 대기중</span>
                                 <span class="tag tag-gray" style="display: none;">승인 완료</span>
                                 <span class="tag tag-red" style="display: none;">승인 거절</span>
                              </td>
                           </tr>
                        </tbody>
                     </table>
                  </div>
               </div>
               
					<div class="popup_btn_wrap">
						<div class="btn_wrap center">
							<button type="button" class="btn btn-line btn-lg" onclick="closeDetailPopup()">닫기</button>
						</div>
					</div>
            </div>
         </div>
      </div>

      <script>

         function openDetailPopup() {
            document.getElementById('spacePopWrap').classList.add('open');
            document.body.style.overflow = 'hidden';
         }
         function closeDetailPopup() {
            document.getElementById('spacePopWrap').classList.remove('open');
            document.body.style.overflow = '';
         }
      </script>
   </body>
</html>
